<svg xmlns="http://www.w3.org/2000/svg" width="1220" height="620" viewBox="0 0 1220 620" role="img" aria-labelledby="title desc">
  <title id="title">ZeroNotebookLM architecture and verification flow</title>
  <desc id="desc">Two lanes. The runtime lane runs callers through the notebooklm CLI or Python API into a stdlib core, then to Google Gemini Notebook web RPC; browser helpers are optional and limited to authentication and cookie import. The verification lane compares the implementation to pinned notebooklm-py 0.7.2 artifacts through row ledgers, fixtures, fake RPC servers, and release audits.</desc>
  <rect width="1220" height="620" fill="#0b1020"/>
  <rect x="28" y="28" width="1164" height="564" rx="28" fill="#111827" stroke="#263247" stroke-width="2"/>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#38bdf8"/>
    </marker>
    <marker id="amber-arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#fbbf24"/>
    </marker>
    <marker id="violet-arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#a78bfa"/>
    </marker>
  </defs>

  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif">
    <text x="610" y="76" text-anchor="middle" fill="#f8fafc" font-size="30" font-weight="700">ZeroNotebookLM: one core, two proof paths</text>
    <text x="610" y="108" text-anchor="middle" fill="#b9c3d0" font-size="16">Runtime stays stdlib-only; verification stays pinned to notebooklm-py 0.7.2 for this cycle</text>

    <text x="82" y="155" fill="#93c5fd" font-size="14" font-weight="700">runtime lane</text>
    <line x1="210" y1="235" x2="282" y2="235" stroke="#38bdf8" stroke-width="3" marker-end="url(#arrow)"/>
    <line x1="470" y1="235" x2="542" y2="235" stroke="#38bdf8" stroke-width="3" marker-end="url(#arrow)"/>
    <line x1="808" y1="235" x2="880" y2="235" stroke="#38bdf8" stroke-width="3" marker-end="url(#arrow)"/>

    <rect x="72" y="176" width="138" height="118" rx="16" fill="#172033" stroke="#334155" stroke-width="2"/>
    <text x="141" y="210" text-anchor="middle" fill="#f8fafc" font-size="16" font-weight="700">Callers</text>
    <text x="141" y="238" text-anchor="middle" fill="#cbd5e1" font-size="13">human CLI</text>
    <text x="141" y="260" text-anchor="middle" fill="#cbd5e1" font-size="13">Python code</text>
    <text x="141" y="282" text-anchor="middle" fill="#94a3b8" font-size="12">future MCP deferred</text>

    <rect x="292" y="162" width="178" height="146" rx="16" fill="#102a43" stroke="#38bdf8" stroke-width="2"/>
    <text x="381" y="197" text-anchor="middle" fill="#f8fafc" font-size="16" font-weight="700">Public surfaces</text>
    <text x="381" y="226" text-anchor="middle" fill="#dbeafe" font-size="13">notebooklm CLI</text>
    <text x="381" y="248" text-anchor="middle" fill="#dbeafe" font-size="13">import notebooklm</text>
    <text x="381" y="270" text-anchor="middle" fill="#dbeafe" font-size="13">single-file artifact</text>
    <text x="381" y="292" text-anchor="middle" fill="#93c5fd" font-size="12">verified offline</text>

    <rect x="552" y="146" width="256" height="178" rx="16" fill="#064e3b" fill-opacity="0.45" stroke="#34d399" stroke-width="2"/>
    <text x="680" y="181" text-anchor="middle" fill="#f8fafc" font-size="16" font-weight="700">Stdlib core</text>
    <text x="680" y="211" text-anchor="middle" fill="#d1fae5" font-size="13">auth/session loaders</text>
    <text x="680" y="233" text-anchor="middle" fill="#d1fae5" font-size="13">HTTP transport</text>
    <text x="680" y="255" text-anchor="middle" fill="#d1fae5" font-size="13">versioned RPC registry</text>
    <text x="680" y="277" text-anchor="middle" fill="#d1fae5" font-size="13">models and error mapping</text>
    <text x="680" y="302" text-anchor="middle" fill="#a7f3d0" font-size="12">zero runtime package deps</text>

    <rect x="890" y="176" width="198" height="118" rx="16" fill="#1f2937" stroke="#64748b" stroke-width="2"/>
    <text x="989" y="210" text-anchor="middle" fill="#f8fafc" font-size="16" font-weight="700">Gemini Notebook</text>
    <text x="989" y="238" text-anchor="middle" fill="#cbd5e1" font-size="13">Google web RPC</text>
    <text x="989" y="260" text-anchor="middle" fill="#cbd5e1" font-size="13">network required</text>
    <text x="989" y="282" text-anchor="middle" fill="#94a3b8" font-size="12">private, drift-prone surface</text>

    <path d="M680 324 C680 348 520 330 520 348" fill="none" stroke="#fbbf24" stroke-width="2.3" stroke-dasharray="7 6" marker-end="url(#amber-arrow)"/>
    <rect x="382" y="348" width="276" height="74" rx="15" fill="#78350f" fill-opacity="0.32" stroke="#fbbf24" stroke-width="1.6"/>
    <text x="520" y="378" text-anchor="middle" fill="#fef3c7" font-size="14" font-weight="700">Browser helper</text>
    <text x="520" y="402" text-anchor="middle" fill="#fde68a" font-size="12">interactive login · cookie import</text>

    <text x="82" y="467" fill="#c4b5fd" font-size="14" font-weight="700">verification lane</text>
    <line x1="292" y1="498" x2="370" y2="498" stroke="#a78bfa" stroke-width="3" marker-end="url(#violet-arrow)"/>
    <line x1="582" y1="498" x2="660" y2="498" stroke="#a78bfa" stroke-width="3" marker-end="url(#violet-arrow)"/>
    <line x1="862" y1="498" x2="940" y2="498" stroke="#a78bfa" stroke-width="3" marker-end="url(#violet-arrow)"/>

    <rect x="72" y="456" width="220" height="84" rx="16" fill="#291f43" stroke="#a78bfa" stroke-width="2"/>
    <text x="182" y="486" text-anchor="middle" fill="#f8fafc" font-size="15" font-weight="700">Pinned upstream</text>
    <text x="182" y="511" text-anchor="middle" fill="#ddd6fe" font-size="12">notebooklm-py 0.7.2</text>
    <text x="182" y="531" text-anchor="middle" fill="#c4b5fd" font-size="12">wheel hash + source commit</text>

    <rect x="380" y="456" width="202" height="84" rx="16" fill="#291f43" stroke="#a78bfa" stroke-width="2"/>
    <text x="481" y="486" text-anchor="middle" fill="#f8fafc" font-size="15" font-weight="700">Compatibility ledger</text>
    <text x="481" y="511" text-anchor="middle" fill="#ddd6fe" font-size="12">CLI · API · RPC · auth</text>
    <text x="481" y="531" text-anchor="middle" fill="#c4b5fd" font-size="12">pass only with evidence</text>

    <rect x="670" y="456" width="192" height="84" rx="16" fill="#291f43" stroke="#a78bfa" stroke-width="2"/>
    <text x="766" y="486" text-anchor="middle" fill="#f8fafc" font-size="15" font-weight="700">Offline gates</text>
    <text x="766" y="511" text-anchor="middle" fill="#ddd6fe" font-size="12">fixtures · fake server</text>
    <text x="766" y="531" text-anchor="middle" fill="#c4b5fd" font-size="12">direct differentials</text>

    <rect x="950" y="456" width="188" height="84" rx="16" fill="#291f43" stroke="#a78bfa" stroke-width="2"/>
    <text x="1044" y="486" text-anchor="middle" fill="#f8fafc" font-size="15" font-weight="700">Release audit</text>
    <text x="1044" y="511" text-anchor="middle" fill="#ddd6fe" font-size="12">fail closed on blockers</text>
    <text x="1044" y="531" text-anchor="middle" fill="#c4b5fd" font-size="12">1:1 claim withheld</text>
  </g>
</svg>
